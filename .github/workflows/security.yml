name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Sunday 03:00 UTC — catch new advisories on previously-clean deps.
    - cron: "0 3 * * 0"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  osv-scanner:
    name: OSV-Scanner (deps)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.0.2
    with:
      # SARIF results upload to GitHub Code Scanning. Fail PRs only on
      # CRITICAL/HIGH so transitive low-severity noise doesn't block work.
      scan-args: |-
        --recursive
        --skip-git
        --config=.github/osv-scanner.toml
        ./
    permissions:
      contents: read
      security-events: write
      actions: read

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Without a license, action runs but skips org-wide features.
          # For an OSS solo repo that's fine.
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
