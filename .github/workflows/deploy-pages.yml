name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build docs (VitePress)
        run: pnpm docs:build

      - name: Build playground
        env:
          PLAYGROUND_BASE: /vue-ink/playground/
        run: pnpm playground:build

      - name: Merge playground into docs dist
        run: |
          mkdir -p packages/docs/.vitepress/dist/playground
          cp -R apps/playground/dist/. packages/docs/.vitepress/dist/playground/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
