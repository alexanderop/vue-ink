name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality-gate:
    name: Lint, typecheck, test, build (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
        # node-pty-driven tests (e.g. Exit.test.ts) can be flaky on some CI
        # runners — see brain/porting/test-port-status.md. If a cell starts
        # flaking, add an `exclude:` entry here rather than disabling the job.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        # Only upload from a single matrix cell to avoid duplicate uploads.
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

  quality-checks:
    name: Package quality (knip, publint, attw, size-limit)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dead code (knip)
        run: pnpm lint:dead

      - name: Build
        run: pnpm build

      - name: Package quality (publint + attw)
        run: pnpm lint:packages

      - name: Bundle size budgets (size-limit)
        run: pnpm size

  playground-e2e:
    name: Playground E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build playground
        run: pnpm playground:build

      - name: Install Playwright browsers
        run: pnpm --filter @vue-ink/playground exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm --filter @vue-ink/playground test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/playground/playwright-report/
          retention-days: 7

  publish-dry-run:
    name: Publish dry-run (pack listing sanity)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Assert pack listings contain dist/ and .d.ts
        run: |
          set -euo pipefail
          # Inspect what `npm publish` would ship for every publishable
          # workspace package (packages/* that isn't `private` — currently
          # only @vue-ink/docs is excluded). Each pack listing must contain
          # at least one dist/ file and at least one .d.ts file — catches
          # missing builds, broken `files` arrays, or .npmignore drift
          # before a release goes out.
          mapfile -t pkgs < <(node -e "
            const { readdirSync, readFileSync, statSync } = require('node:fs');
            const path = require('node:path');
            const root = path.resolve('packages');
            for (const name of readdirSync(root)) {
              const dir = path.join(root, name);
              if (!statSync(dir).isDirectory()) continue;
              try {
                const pkg = JSON.parse(readFileSync(path.join(dir, 'package.json'), 'utf8'));
                if (pkg.private) continue;
                console.log(pkg.name + '\t' + dir);
              } catch {}
            }
          ")
          failed=0
          for entry in "${pkgs[@]}"; do
            pkg_name=${entry%%$'\t'*}
            pkg_path=${entry#*$'\t'}
            printf '\n=== %s ===\n' "$pkg_name"
            pack_json=$(cd "$pkg_path" && npm pack --dry-run --json)
            files=$(PACK_JSON="$pack_json" node -e "
              const data = JSON.parse(process.env.PACK_JSON);
              for (const entry of data) {
                for (const f of entry.files) console.log(f.path);
              }
            ")
            echo "$files"
            if ! grep -q '^dist/' <<<"$files"; then
              echo "::error::${pkg_name} pack listing is missing dist/ files"
              failed=1
            fi
            if ! grep -q '\.d\.ts$' <<<"$files"; then
              echo "::error::${pkg_name} pack listing is missing .d.ts files"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo '::error::Publish dry-run failed: one or more packages are missing dist/ or .d.ts files in their pack listing.'
            exit 1
          fi
          printf '\nAll publishable packages pack dist/ + .d.ts files.\n'
